<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BengBoll</title>
</head>
<body style="margin:0; position:relative;">
    <img id="foto" src="fundo.png" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:-1;">
    <div id="menu" style="display:flex; justify-content:space-between; align-items:center; height:100vh; padding:0 100px;">
        <button id="btn1p" onclick="iniciar('1p')" style="padding:20px 50px; font-size:30px; cursor:pointer; background-color:#0088ff; border:3px solid #00bbff; color:#ffffff; border-radius:10px;">1 Jogador</button>
        <button id="btn2p" onclick="iniciar('2p')" style="padding:20px 50px; font-size:30px; cursor:pointer; background-color:#0088ff; border:3px solid #00bbff; color:#ffffff; border-radius:10px;">2 Jogadores</button>
    </div>
     <button id="btnJogarNovamente" onclick="jogarNovamente()" style=" display:none; position:absolute; left:50%; transform:translateX(-50%); padding:18px 50px; font-size:24px; font-weight:bold; cursor:pointer; background-color:#0313f1; border:3px solid #00bbff; color:#ffffff; border-radius:12px; z-index:10;"> Jogar Novamente </button>
    <canvas style="display:none; position:absolute; top:0; left:0; z-index:1;"></canvas>
    <script src="script.js"></script>
</body>
</html>
